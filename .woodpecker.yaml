steps:
  backend-tests:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    commands:
      - uv sync --frozen
      - uv run python -m unittest -v

  frontend-tests-and-build:
    image: node:22-bookworm-slim
    commands:
      - cd web
      - npm ci
      - npm test -- --run
      - npm run build

  verify-container-build:
    image: woodpeckerci/plugin-docker-buildx
    depends_on:
      - backend-tests
      - frontend-tests-and-build
    environment:
      FRED_API_KEY:
        from_secret: FRED_API_KEY
    settings:
      registry: gitea.chadlee.org
      repo: gitea.chadlee.org/${CI_REPO_OWNER}/qmis
      dockerfile: Dockerfile
      dry_run: true
      build_args_from_env:
        - CI_REPO_URL
        - CI_COMMIT_SHA
        - FRED_API_KEY
    when:
      event:
        - pull_request
        - push
        - tag

  publish-container-default-branch:
    image: woodpeckerci/plugin-docker-buildx
    depends_on:
      - verify-container-build
    environment:
      FRED_API_KEY:
        from_secret: FRED_API_KEY
    settings:
      registry: gitea.chadlee.org
      repo: gitea.chadlee.org/${CI_REPO_OWNER}/qmis
      dockerfile: Dockerfile
      username:
        from_secret: REGISTRY_USER
      password:
        from_secret: REGISTRY_PASS
      tags:
        - latest
      build_args_from_env:
        - CI_REPO_URL
        - CI_COMMIT_SHA
        - FRED_API_KEY
    when:
      event:
        - push
      branch:
        - main

  publish-container-dev-branch:
    image: woodpeckerci/plugin-docker-buildx
    depends_on:
      - verify-container-build
    environment:
      FRED_API_KEY:
        from_secret: FRED_API_KEY
    settings:
      registry: gitea.chadlee.org
      repo: gitea.chadlee.org/${CI_REPO_OWNER}/qmis
      dockerfile: Dockerfile
      username:
        from_secret: REGISTRY_USER
      password:
        from_secret: REGISTRY_PASS
      tags:
        - dev
      build_args_from_env:
        - CI_REPO_URL
        - CI_COMMIT_SHA
        - FRED_API_KEY
    when:
      event:
        - push
      branch:
        - dev

  publish-container-tags:
    image: woodpeckerci/plugin-docker-buildx
    depends_on:
      - verify-container-build
    environment:
      FRED_API_KEY:
        from_secret: FRED_API_KEY
    settings:
      registry: gitea.chadlee.org
      repo: gitea.chadlee.org/${CI_REPO_OWNER}/qmis
      dockerfile: Dockerfile
      username:
        from_secret: REGISTRY_USER
      password:
        from_secret: REGISTRY_PASS
      auto_tag: true
      build_args_from_env:
        - CI_REPO_URL
        - CI_COMMIT_SHA
        - FRED_API_KEY
    when:
      event:
        - tag

  upload-compose-file:
    image: appleboy/drone-scp
    depends_on:
      - publish-container-dev-branch
    settings:
      host: infra-docker.zocalo.net
#        from_secret: DEV_DOCKER_HOST_IP
      username:
        from_secret: DOCKER_HOST_USER
      key:
        from_secret: DOCKER_HOST_SSH_KEY
      port: 22
      target: /srv/docker/qmis/
      source: docker-compose.yml
    when:
      event:
        - push
      branch:
        - dev

  upload-deploy-script:
    image: appleboy/drone-scp
    depends_on:
      - publish-container-dev-branch
    settings:
      host: infra-docker.zocalo.net
#        from_secret: DEV_DOCKER_HOST_IP
      username:
        from_secret: DOCKER_HOST_USER
      key:
        from_secret: DOCKER_HOST_SSH_KEY
      port: 22
      target: /srv/docker/qmis/
      source: docker/deploy.sh
      strip_components: 1
    when:
      event:
        - push
      branch:
        - dev

  deploy-dev:
    image: appleboy/drone-ssh
    depends_on:
      - upload-compose-file
      - upload-deploy-script
    settings:
      host: infra-docker.zocalo.net
#        from_secret: DEV_DOCKER_HOST_IP
      username:
        from_secret: DOCKER_HOST_USER
      key:
        from_secret: DOCKER_HOST_SSH_KEY
      port: 22
      script:
        - mkdir -p /srv/docker/qmis/runtime
        - chmod +x /srv/docker/qmis/deploy.sh
        - cd /srv/docker/qmis
        - QMIS_IMAGE=gitea.chadlee.org/${CI_REPO_OWNER}/qmis:dev /srv/docker/qmis/deploy.sh
    when:
      event:
        - push
      branch:
        - dev
